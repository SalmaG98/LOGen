experiment:
    id: train_sloper4d_no_shape
##Data
data:
    data_dir: /home/sgalaaou/workspace/SLOPER4D/per_person_updated.pkl
    dataloader: 'sloper4d'
    points_per_object: -1
    align_objects: True
    stacking_type: max
    normalize_points: False

##Training
train:
    uncond_prob: 0.1
    uncond_w: 1.
    n_gpus: 4
    num_workers: 16
    max_epoch: 200
    lr: 0.0001
    batch_size: 32
    decay_lr: 1.0e-4
    class_conditional: False
    ema: True

diff:
    beta_start: 3.5e-5
    beta_end: 0.007
    beta_func: 'linear'
    t_steps: 1000
    s_steps: 50
    reg_weight: 0.0
    visualize: False
    num_val_samples: 10

##Network
model:
    embeddings: pointnet
    num_conditions: 75
    cyclic_conditions: 73
    linear_conditions: 0
    map_shape_to_one: True
    relative_angles: False
    num_classes: 1
    size: DiT-XS/4
    conditioning: logen
    pretrained: False # unused
    improved_cfg: True # unused
    in_channels: 3